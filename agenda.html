<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/png" href="assets/favicon.png">
  <title>EU HUB Summer Agenda</title>
  <link rel="stylesheet" href="assets/site-shared.css">
  <style>
    :root {
      --ink: #13245a;
      --muted: #647186;
      --line: #d8e5ea;
      --paper: #fbfdff;
      --panel: #ffffff;
      --navy: #203f8e;
      --teal: #16b7b6;
      --teal-dark: #087682;
      --magenta: #d12a91;
      --lime: #95c83d;
      --amber: #f4b51f;
      --shadow: 0 18px 44px rgba(19, 36, 90, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(22, 183, 182, 0.18), transparent 34rem),
        radial-gradient(circle at top right, rgba(209, 42, 145, 0.12), transparent 30rem),
        linear-gradient(180deg, rgba(251, 253, 255, 0.96), rgba(246, 250, 252, 0.98));
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.45;
    }

    button,
    input,
    select {
      font: inherit;
    }

    .shell {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 40px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 22px;
      position: sticky;
      top: 0;
      z-index: 20;
      padding: 12px 0;
      backdrop-filter: blur(14px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 13px;
      min-width: 0;
    }

    .mark {
      width: 44px;
      height: 44px;
      display: grid;
      place-items: center;
      flex: 0 0 auto;
      width: 72px;
      height: 72px;
      padding: 6px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      box-shadow: 0 10px 24px rgba(19, 36, 90, 0.12);
    }

    .mark img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .brand h1 {
      margin: 0;
      font-size: clamp(1.55rem, 3vw, 2.5rem);
      letter-spacing: 0;
      line-height: 1.04;
    }

    .brand p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 0.98rem;
    }

    .agenda-subheader {
      margin: 26px 0 28px;
    }

    .agenda-subheader h1 {
      margin: 0;
      color: var(--ink);
      font-size: clamp(2rem, 4.4vw, 3.9rem);
      line-height: 1;
      letter-spacing: 0;
    }

    .agenda-subheader p {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: clamp(1rem, 1.8vw, 1.34rem);
      font-weight: 650;
    }

    .nav {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      flex-wrap: wrap;
    }

    .nav a {
      display: inline-flex;
      align-items: center;
      min-height: 38px;
      padding: 8px 12px;
      border: 1px solid rgba(216, 229, 234, 0.9);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.76);
      color: var(--navy);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 800;
    }

    .nav a:hover,
    .nav a.active {
      color: #fff;
      border-color: var(--teal-dark);
      background: var(--teal-dark);
    }

    .roster {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin: 20px 0 18px;
    }

    .roster-card {
      background: rgba(255, 255, 255, 0.82);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 17px 18px;
      box-shadow: 0 10px 28px rgba(19, 36, 90, 0.08);
    }

    .roster-card h2 {
      margin: 0;
      display: block;
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .roster-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .roster-pill {
      display: inline-flex;
      align-items: center;
      min-height: 32px;
      max-width: 100%;
      padding: 6px 10px;
      border-radius: 6px;
      background: rgba(22, 183, 182, 0.12);
      color: var(--teal-dark);
      font-size: 0.88rem;
      font-weight: 800;
    }

    .roster-card.staff .roster-pill {
      background: rgba(209, 42, 145, 0.1);
      color: #9d1d6e;
    }

    .controls {
      display: grid;
      grid-template-columns: minmax(220px, 1fr) auto minmax(210px, 260px);
      gap: 12px;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 10;
      padding: 12px;
      margin-bottom: 20px;
      background: rgba(251, 252, 248, 0.9);
      backdrop-filter: blur(14px);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 12px 36px rgba(19, 36, 90, 0.1);
    }

    .search {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
      padding: 0 12px;
      min-height: 42px;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 8px;
    }

    .search svg {
      flex: 0 0 auto;
      color: var(--muted);
    }

    .search input {
      width: 100%;
      min-width: 0;
      border: 0;
      outline: 0;
      color: var(--ink);
      background: transparent;
    }

    .segmented {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 4px;
      background: #eef8f9;
      border: 1px solid #d5e8ee;
      border-radius: 8px;
    }

    .segmented button {
      min-height: 34px;
      border: 0;
      border-radius: 6px;
      color: var(--muted);
      background: transparent;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.18s ease, color 0.18s ease, transform 0.18s ease;
    }

    .segmented button {
      padding: 0 12px;
      font-weight: 750;
      font-size: 0.88rem;
    }

    .segmented button:hover {
      transform: translateY(-1px);
    }

    .segmented button.active {
      background: #fff;
      color: var(--navy);
      box-shadow: 0 6px 14px rgba(19, 36, 90, 0.12);
    }

    .person-filter {
      position: relative;
      display: flex;
      align-items: center;
      min-height: 42px;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
    }

    .person-filter svg {
      position: absolute;
      right: 12px;
      pointer-events: none;
      color: var(--muted);
    }

    .person-filter select {
      width: 100%;
      min-height: 42px;
      padding: 0 38px 0 12px;
      border: 0;
      outline: 0;
      color: var(--ink);
      background: transparent;
      font-weight: 760;
      appearance: none;
      cursor: pointer;
    }

    .week-note {
      display: block;
      margin-top: 8px;
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 700;
      line-height: 1.25;
    }

    .weeks {
      display: grid;
      gap: 18px;
    }

    .week {
      display: grid;
      grid-template-columns: 190px minmax(0, 1fr);
      gap: 16px;
      align-items: start;
    }

    .date-rail {
      position: sticky;
      top: 96px;
      padding: 16px;
      border-left: 5px solid var(--teal);
      background: rgba(255, 255, 255, 0.68);
      border-radius: 8px;
      box-shadow: 0 8px 28px rgba(19, 36, 90, 0.08);
    }

    .date-rail small {
      display: block;
      color: var(--muted);
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-size: 0.72rem;
    }

    .date-rail strong {
      display: block;
      margin-top: 4px;
      font-size: 1.18rem;
      line-height: 1.15;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .card {
      min-height: 218px;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 13px;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .card.placeholder {
      min-height: 154px;
      background: repeating-linear-gradient(135deg, #fff, #fff 12px, #f6f8f4 12px, #f6f8f4 24px);
    }

    .card-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    .time {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      width: fit-content;
      padding: 7px 9px;
      border-radius: 6px;
      color: #fff;
      background: var(--navy);
      font-weight: 800;
      font-size: 0.86rem;
    }

    .placeholder .time {
      background: var(--magenta);
    }

    .location {
      margin: 0;
      font-size: 1.08rem;
      line-height: 1.22;
    }

    .venue {
      display: inline;
      color: var(--muted);
      font-size: 0.91rem;
      font-weight: 680;
    }

    .detail-row {
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin-top: 9px;
    }

    .people-row {
      align-items: center;
      margin-top: 10px;
    }

    .field-label {
      flex: 0 0 auto;
      color: var(--muted);
      font-size: 0.74rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .days {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 12px;
    }

    .day-chip {
      display: inline-flex;
      align-items: center;
      min-height: 26px;
      padding: 4px 8px;
      border-radius: 6px;
      background: rgba(244, 181, 31, 0.16);
      color: #80580a;
      font-size: 0.76rem;
      font-weight: 800;
    }

    .placeholder .location {
      color: var(--muted);
    }

    .people {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      align-content: start;
      flex: 1 1 auto;
      margin-top: 0;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      min-height: 29px;
      max-width: 100%;
      padding: 5px 9px;
      border-radius: 6px;
      background: rgba(22, 183, 182, 0.12);
      color: var(--teal-dark);
      font-size: 0.83rem;
      font-weight: 780;
    }

    .card-foot {
      display: grid;
      gap: 8px;
      padding-top: 12px;
      border-top: 1px solid var(--line);
    }

    .contact-name {
      display: block;
      margin-top: 0;
      color: var(--ink);
      font-weight: 800;
    }

    .contact-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .link-button {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      min-height: 34px;
      padding: 7px 10px;
      border-radius: 6px;
      border: 1px solid #cad8cf;
      color: var(--navy);
      background: #f8fbf8;
      text-decoration: none;
      font-size: 0.84rem;
      font-weight: 760;
    }

    .link-button:hover {
      border-color: var(--teal);
      color: #fff;
      background: var(--teal-dark);
    }

    .empty {
      display: none;
      padding: 30px;
      text-align: center;
      border: 1px dashed #c7d3ca;
      border-radius: 8px;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.72);
    }

    .empty.show {
      display: block;
    }

    .site-footer {
      margin-top: 34px;
      padding: 22px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.84);
      box-shadow: var(--shadow);
    }

    .site-footer h2 {
      margin: 0;
      font-size: 1.35rem;
      line-height: 1.15;
    }

    .site-footer p {
      max-width: 740px;
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 0.94rem;
      font-weight: 650;
    }

    .external-links {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 16px;
    }

    .external-links a {
      display: inline-flex;
      align-items: center;
      min-height: 40px;
      padding: 9px 12px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--navy);
      text-decoration: none;
      font-weight: 800;
    }

    .site-footer .note {
      max-width: none;
      white-space: nowrap;
    }

    .site-footer.shared-footer {
      text-align: center;
    }

    .site-footer.shared-footer .note {
      max-width: none;
      margin: 10px auto 0;
      white-space: nowrap;
    }

    .site-footer .external-links {
      justify-content: center;
    }

    .site-footer.shared-footer .external-links {
      width: 100%;
      justify-content: center;
      align-items: center;
    }

    .site-footer .external-links a {
      gap: 8px;
      justify-content: center;
    }

    .site-footer .external-links svg {
      width: 18px;
      height: 18px;
      flex: 0 0 auto;
      stroke: currentColor;
      stroke-width: 2;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .site-credit {
      margin-top: 22px;
      padding-top: 18px;
      border-top: 1px solid var(--line);
      text-align: center;
    }

    .site-footer.shared-footer .site-credit {
      text-align: center;
      display: grid;
      justify-items: center;
    }

    .creator-role {
      display: block;
      margin-top: 3px;
      font-size: 0.84rem;
      font-style: italic;
      font-weight: 600;
    }

    .collab-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-top: 8px;
      min-height: 38px;
      padding: 8px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--navy);
      box-shadow: 0 10px 20px rgba(19, 36, 90, 0.08);
      font-weight: 850;
      text-decoration: none;
    }

    .hide {
      display: none;
    }

    @media (max-width: 980px) {
      .controls {
        grid-template-columns: 1fr;
      }

      .person-filter {
        width: 100%;
      }

      .segmented button {
        flex: 1 1 auto;
      }

      .week {
        grid-template-columns: 1fr;
      }

      .date-rail {
        position: static;
      }
    }

    @media (max-width: 720px) {
      .shell {
        width: min(100% - 22px, 1180px);
        padding-top: 18px;
      }

      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .site-footer .note {
        white-space: normal;
      }

      .site-footer.shared-footer .note {
        white-space: normal;
      }

      .roster,
      .cards {
        grid-template-columns: 1fr;
      }

      .controls {
        position: static;
      }

      .brand {
        align-items: flex-start;
      }

      .mark {
        width: 58px;
        height: 58px;
      }

      .card {
        min-height: 0;
      }
    }

    @media print {
      body {
        background: #fff;
      }

      .shell {
        width: 100%;
        padding: 0;
      }

      .controls {
        display: none;
      }

      .date-rail,
      .card,
      .roster-card {
        box-shadow: none;
      }

      .week {
        break-inside: avoid;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <div data-site-header data-active-page="agenda"></div>

    <section class="agenda-subheader" aria-label="Agenda heading">
      <h1>Summer Camps Volunteering Agenda</h1>
      <p>03 July - 14 August schedule</p>
    </section>

    <section class="roster" aria-label="Team roster">
      <article class="roster-card">
        <h2>Volunteers</h2>
        <div class="roster-list" id="volunteerList"></div>
      </article>
      <article class="roster-card staff">
        <h2>Staff</h2>
        <div class="roster-list" id="staffList"></div>
      </article>
    </section>

    <section class="controls" aria-label="Agenda filters">
      <label class="search" for="searchInput">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="m21 21-4.35-4.35M10.5 18a7.5 7.5 0 1 1 0-15 7.5 7.5 0 0 1 0 15Z" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <input id="searchInput" type="search" placeholder="Search date, person, place, contact">
      </label>

      <div class="segmented" role="group" aria-label="Week filter">
        <button class="active" type="button" data-week-filter="all">All</button>
        <button type="button" data-week-filter="July">July</button>
        <button type="button" data-week-filter="August">August</button>
      </div>

      <label class="person-filter" for="personFilter" aria-label="Person filter">
        <select id="personFilter"></select>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="m6 9 6 6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </label>
    </section>

    <section class="weeks" id="weeks" aria-label="Agenda entries"></section>
    <p class="empty" id="emptyState">No agenda items match the current filters.</p>

    <div data-site-footer></div>
  </main>

    const weeksElement = document.querySelector("#weeks");
    const personFilter = document.querySelector("#personFilter");
    const searchInput = document.querySelector("#searchInput");
    const emptyState = document.querySelector("#emptyState");
    const weekButtons = [...document.querySelectorAll("[data-week-filter]")];
    const state = {
      week: "all",
      person: "all",
      search: ""
    };

    let agenda = fallbackAgenda;
    let lastSheetSignature = "";
    const volunteerList = document.querySelector("#volunteerList");
    const staffList = document.querySelector("#staffList");

    volunteerList.innerHTML = volunteers.map((person) => rosterPill(person)).join("");
    staffList.innerHTML = staff.map((person) => rosterPill(person)).join("");

    personFilter.innerHTML = `
      <option value="all">All people</option>
      <optgroup label="Groups">
        <option value="Volunteers">Volunteers</option>
        <option value="Staff">Staff</option>
        <option value="Everyone">Everyone</option>
      </optgroup>
      <optgroup label="Volunteers">
        ${volunteers.map((person) => optionTemplate(person)).join("")}
      </optgroup>
      <optgroup label="Staff">
        ${staff.map((person) => optionTemplate(person)).join("")}
      </optgroup>
      <optgroup label="Contact persons">
        ${contactPeople.map((person) => optionTemplate(person)).join("")}
      </optgroup>
    `;

    function optionTemplate(value) {
      return `<option value="${value}">${value}</option>`;
    }

    function rosterPill(value) {
      return `<span class="roster-pill">${value}</span>`;
    }

    personFilter.addEventListener("change", () => {
      state.person = personFilter.value;
      render();
    });

    weekButtons.forEach((button) => {
      button.addEventListener("click", () => {
        state.week = button.dataset.weekFilter;
        weekButtons.forEach((item) => item.classList.toggle("active", item === button));
        render();
      });
    });

    searchInput.addEventListener("input", () => {
      state.search = searchInput.value.trim().toLowerCase();
      render();
    });

    async function loadAgendaFromSheet() {
      try {
        const response = await fetch(`${GOOGLE_SHEET_CSV_URL}&cacheBust=${Date.now()}`, { cache: "no-store" });
        if (!response.ok) throw new Error(`Google Sheet request failed: ${response.status}`);
        const csvText = await response.text();
        const rows = parseCsv(csvText);
        const nextAgenda = agendaFromRows(rows);
        const nextSignature = JSON.stringify(nextAgenda);
        if (nextAgenda.length) {
          if (nextSignature === lastSheetSignature) return;
          lastSheetSignature = nextSignature;
          agenda = nextAgenda;
          render();
        }
      } catch (error) {
        console.warn("Using fallback agenda because the Google Sheet could not be loaded.", error);
      }
    }

    function parseCsv(csvText) {
      const rows = [];
      let row = [];
      let field = "";
      let inQuotes = false;

      for (let index = 0; index < csvText.length; index += 1) {
        const char = csvText[index];
        const next = csvText[index + 1];

        if (char === '"' && inQuotes && next === '"') {
          field += '"';
          index += 1;
        } else if (char === '"') {
          inQuotes = !inQuotes;
        } else if (char === "," && !inQuotes) {
          row.push(field);
          field = "";
        } else if ((char === "\n" || char === "\r") && !inQuotes) {
          if (char === "\r" && next === "\n") index += 1;
          row.push(field);
          if (row.some((cell) => cell.trim())) rows.push(row);
          row = [];
          field = "";
        } else {
          field += char;
        }
      }

      row.push(field);
      if (row.some((cell) => cell.trim())) rows.push(row);
      return rows;
    }

    function agendaFromRows(rows) {
      const [headers, ...body] = rows;
      if (!headers || !body.length) return [];
      const keyMap = headers.reduce((map, header, index) => {
        map[normalizeHeader(header)] = index;
        return map;
      }, {});
      const weekMap = new Map();

      body.forEach((row) => {
        const date = getCell(row, keyMap, "date");
        const time = getCell(row, keyMap, "time") || "TBC";
        const people = splitPeople(getCell(row, keyMap, "who"));
        const what = getCell(row, keyMap, "what") || "Agenda item";
        const venue = getCell(row, keyMap, "where") || "Location to be confirmed";
        const contactName = getCell(row, keyMap, "contactperson");
        const contactEmail = getCell(row, keyMap, "contactemail");
        const contactPhone = getCell(row, keyMap, "contactphone");
        if (!date || !people.length) return;

        const weekLabel = getCell(row, keyMap, "weeklabel") || inferLabel(date, what);
        const weekNote = getCell(row, keyMap, "weeknote");
        const days = splitDays(getCell(row, keyMap, "days"));
        const contact = contactName || contactEmail || contactPhone
          ? { name: contactName || "Contact person", email: contactEmail, phone: contactPhone }
          : null;

        if (!weekMap.has(date)) {
          weekMap.set(date, { date, label: weekLabel, note: weekNote, items: [] });
        }

        const week = weekMap.get(date);
        if (!week.note && weekNote) week.note = weekNote;
        week.items.push({ time, people, what, venue, days, contact });
      });

      return [...weekMap.values()];
    }

    function normalizeHeader(value) {
      return String(value || "").toLowerCase().replace(/[^a-z0-9]/g, "");
    }

    function getCell(row, keyMap, key) {
      const index = keyMap[key];
      return index === undefined ? "" : String(row[index] || "").trim();
    }

    function splitPeople(value) {
      return String(value || "")
        .split(",")
        .map((person) => person.trim())
        .filter(Boolean);
    }

    function splitDays(value) {
      const days = String(value || "")
        .split(",")
        .map((day) => day.trim())
        .filter(Boolean);
      return days.length ? days : null;
    }

    function inferLabel(date, what) {
      if (date.includes("-")) return "Working Week";
      if (what.toLowerCase().includes("volunteering")) return "Volunteering";
      return "Agenda";
    }

    function render() {
      let visibleItems = 0;
      weeksElement.innerHTML = agenda.map((week) => {
        const items = week.items.filter((item) => matchesFilters(week, item));
        if (!items.length) return "";
        visibleItems += items.length;
        return `
          <article class="week">
            <aside class="date-rail">
              <small>${week.label}</small>
              <strong>${week.date}</strong>
              ${week.note ? `<span class="week-note">${week.note}</span>` : ""}
            </aside>
            <div class="cards">
              ${items.map((item) => cardTemplate(item)).join("")}
            </div>
          </article>
        `;
      }).join("");
      emptyState.classList.toggle("show", visibleItems === 0);
    }

    function matchesFilters(week, item) {
      const weekMatch = state.week === "all" || week.date.includes(state.week);
      const expandedPeople = expandedPeopleFor(item);
      const personMatch =
        state.person === "all" ||
        item.people.includes(state.person) ||
        expandedPeople.includes(state.person) ||
        contactMatches(item, state.person) ||
        groupMatches(item, state.person);
      const haystack = [
        week.date,
        week.label,
        week.note,
        item.time,
        item.what,
        item.venue,
        item.days?.join(" "),
        item.people.join(" "),
        item.contact?.name,
        item.contact?.email,
        item.contact?.phone
      ].filter(Boolean).join(" ").toLowerCase();
      return weekMatch && personMatch && haystack.includes(state.search);
    }

    function expandedPeopleFor(item) {
      return [...new Set(item.people.flatMap((person) => groupPeople[person] || [person]))];
    }

    function groupMatches(item, selected) {
      const group = groupPeople[selected];
      if (!group) return false;
      return item.people.includes(selected) || expandedPeopleFor(item).some((person) => group.includes(person));
    }

    function contactMatches(item, selected) {
      return Boolean(item.contact?.name && item.contact.name.toLowerCase().includes(selected.toLowerCase()));
    }

    function cardTemplate(item) {
      const contact = item.contact;
      const phoneHref = contact?.phone ? contact.phone.replace(/[^\d+]/g, "") : "";
      return `
        <article class="card ${contact ? "" : "placeholder"}">
          <div class="card-head">
            <span class="time">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M12 7v5l3 2M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              </svg>
              ${item.time}
            </span>
          </div>
          <div>
            ${item.days ? `<div class="days">${item.days.map((day) => `<span class="day-chip">${day}</span>`).join("")}</div>` : ""}
            <h2 class="location">${item.what}</h2>
            <div class="detail-row">
              <span class="field-label">Location:</span>
              <span class="venue">${item.venue}</span>
            </div>
            <div class="detail-row people-row">
              <span class="field-label">Who:</span>
              <div class="people" aria-label="Assigned people">
                ${item.people.map((person) => `<span class="chip">${person}</span>`).join("")}
              </div>
            </div>
          </div>
          ${contact ? `
            <footer class="card-foot">
              <span class="field-label">Contact person:</span>
              <span class="contact-name">${contact.name}</span>
              ${contact.email || contact.phone ? `
                <div class="contact-actions">
                  ${contact.email ? `
                    <a class="link-button" href="mailto:${contact.email}">
                      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                        <path d="M4 6h16v12H4z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
                        <path d="m4 7 8 6 8-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                      </svg>
                      Email
                    </a>
                  ` : ""}
                  ${contact.phone ? `
                    <a class="link-button" href="tel:${phoneHref}">
                      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                        <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.7 19.7 0 0 1-8.59-3.05 19.4 19.4 0 0 1-6-6A19.7 19.7 0 0 1 2.18 4.18 2 2 0 0 1 4.17 2h3a2 2 0 0 1 2 1.72c.12.91.33 1.8.63 2.65a2 2 0 0 1-.45 2.11L8.09 9.74a16 16 0 0 0 6.17 6.17l1.26-1.26a2 2 0 0 1 2.11-.45c.85.3 1.74.51 2.65.63A2 2 0 0 1 22 16.92Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                      </svg>
                      ${contact.phone}
                    </a>
                  ` : ""}
                </div>
              ` : ""}
            </footer>
          ` : `
            <footer class="card-foot">
              <span class="contact-name">Details pending</span>
            </footer>
          `}
        </article>
      `;
    }

    render();
    loadAgendaFromSheet();
    setInterval(loadAgendaFromSheet, SHEET_REFRESH_MS);
  </script>
